<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 数字开奖系统</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-wrapper {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 1000px;
            width: 100%;
        }
        
        .login-brand {
            flex: 1;
            color: white;
            display: none;
        }
        
        @media (min-width: 768px) {
            .login-brand {
                display: block;
            }
        }
        
        .login-brand h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-brand p {
            font-size: 18px;
            color: #94a3b8;
            line-height: 1.7;
        }
        
        .login-features {
            margin-top: 40px;
        }
        
        .login-feature {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .login-feature-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .login-feature-text h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .login-feature-text p {
            font-size: 13px;
            color: #94a3b8;
        }
        
        .login-container {
            width: 420px;
            max-width: 100%;
            background: var(--bg-card);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        
        .login-header h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .login-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }
        
        .login-form .form-group {
            margin-bottom: 20px;
        }
        
        .login-form label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .login-form .form-control {
            padding: 14px 16px;
            font-size: 15px;
        }
        
        .login-form .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- 品牌区域（仅桌面端显示） -->
        <div class="login-brand">
            <h1>🎲 数字开奖系统</h1>
            <p>专业的数字开奖管理平台，支持多周期开奖、用户管理、交易处理等完整功能。</p>
            
            <div class="login-features">
                <div class="login-feature">
                    <div class="login-feature-icon">⚡</div>
                    <div class="login-feature-text">
                        <h3>高效开奖</h3>
                        <p>支持5/10/15分钟多周期开奖</p>
                    </div>
                </div>
                <div class="login-feature">
                    <div class="login-feature-icon">🔒</div>
                    <div class="login-feature-text">
                        <h3>安全可靠</h3>
                        <p>JWT认证 + IP白名单保护</p>
                    </div>
                </div>
                <div class="login-feature">
                    <div class="login-feature-icon">📊</div>
                    <div class="login-feature-text">
                        <h3>数据可视</h3>
                        <p>实时统计和数据分析</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 登录表单 -->
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">🎲</div>
                <h1>欢迎回来</h1>
                <p>请登录您的账户</p>
            </div>

            <div class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" autocomplete="current-password">
                </div>

                <button class="btn btn-primary" onclick="login()">登录</button>
                
                <div class="login-footer">
                    <a href="index.html">← 返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 检查是否已登录
        const token = localStorage.getItem('token');
        if (token) {
            fetch('/api/auth?action=me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => res.json())
            .then(data => {
                if (data.user) {
                    redirectByRole(data.user.role);
                }
            })
            .catch(() => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
            });
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            try {
                const res = await fetch('/api/auth?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage('登录成功！', 'success');
                    setTimeout(() => redirectByRole(data.user.role), 1000);
                } else {
                    showMessage(data.error || '登录失败', 'error');
                }
            } catch (error) {
                console.error('登录错误:', error);
                showMessage('网络错误，请重试', 'error');
            }
        }

        function redirectByRole(role) {
            // 管理员跳转到管理后台，普通用户跳转到客户端
            if (role === 'admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        function showMessage(text, type) {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();

            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }
    </script>
</body>
</html>
