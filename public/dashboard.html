<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字开奖管理系统 - 管理后台</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .server-time { font-size: 14px; color: #00ff88; margin-right: 20px; }
        .nav-tabs { background: #f8f9fa; border-bottom: 2px solid #e9ecef; }
        .nav-tab { padding: 15px 30px; font-weight: 500; }
        .nav-tab.active { background: #fff; border-bottom: 3px solid #007bff; color: #007bff; }
        
        /* 开奖预设表格 */
        .draw-table input { width: 150px; text-align: center; font-size: 18px; letter-spacing: 3px; font-weight: bold; }
        .draw-table .period-cell { font-weight: bold; color: #333; font-size: 16px; }
        .draw-table .time-cell { color: #666; }
        .draw-table .status-pending { color: #ffc107; }
        .draw-table .status-completed { color: #28a745; }
        .draw-table .edit-btn { padding: 5px 15px; font-size: 12px; }
        
        /* 用户管理表格 */
        .user-table td { vertical-align: middle; }
        .password-cell { font-family: monospace; color: #888; }
        .action-btns .btn { margin: 2px; padding: 5px 10px; font-size: 12px; }
        
        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 10px; }
        .stat-card h4 { margin: 0 0 10px 0; opacity: 0.9; font-size: 14px; }
        .stat-card .value { font-size: 28px; font-weight: bold; }
        .stat-card:nth-child(2) { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
        .stat-card:nth-child(4) { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
        
        /* 工具栏 */
        .toolbar { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .toolbar label { font-weight: 500; color: #333; }
        .toolbar input, .toolbar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; }
        
        /* 模态框 */
        .modal-content { max-width: 500px; }
        .modal-content.wide { max-width: 700px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        /* 通知 */
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🎰 数字开奖管理系统</h1>
            <div class="header-right">
                <span class="server-time" id="serverTime">服务器时间: --</span>
                <span class="user-info" id="userInfo"></span>
                <button class="btn btn-danger" onclick="logout()">退出登录</button>
            </div>
        </div>

        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="dashboard">📊 控制台</button>
            <button class="nav-tab" data-tab="draws">🎲 开奖预设</button>
            <button class="nav-tab admin-only" data-tab="users">👥 用户管理</button>
            <button class="nav-tab" data-tab="transactions">💰 交易记录</button>
        </div>

        <!-- 内容区域 -->
        <div class="content">
            <!-- 控制台 -->
            <div id="dashboard" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>当前余额</h4>
                        <div class="value" id="balanceDisplay">¥0.00</div>
                    </div>
                    <div class="stat-card">
                        <h4>账户状态</h4>
                        <div class="value" id="statusDisplay">正常</div>
                    </div>
                    <div class="stat-card admin-only">
                        <h4>注册用户</h4>
                        <div class="value" id="userCountDisplay">-</div>
                    </div>
                    <div class="stat-card admin-only">
                        <h4>待审核交易</h4>
                        <div class="value" id="pendingTransactionsDisplay">-</div>
                    </div>
                </div>

                <div class="card">
                    <h3>快速操作</h3>
                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="showDepositModal()">充值申请</button>
                        <button class="btn btn-secondary" onclick="showWithdrawModal()">提现申请</button>
                        <button class="btn btn-secondary" onclick="showChangePasswordModal()">修改密码</button>
                    </div>
                </div>
            </div>

            <!-- 开奖预设 -->
            <div id="draws" class="tab-content">
                <div class="card">
                    <h3>开奖预设管理 <span style="color:#666;font-size:14px;">(管理员可编辑开奖结果)</span></h3>
                    <div class="toolbar">
                        <label>日期：</label>
                        <input type="date" id="drawDate">
                        <label>周期：</label>
                        <select id="drawInterval">
                            <option value="5">5分钟 (288期/天)</option>
                            <option value="10">10分钟 (144期/天)</option>
                            <option value="15">15分钟 (96期/天)</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadDraws()">查询</button>
                        <button class="btn btn-success admin-only" onclick="saveAllDraws()">保存全部</button>
                    </div>
                </div>

                <div class="card">
                    <h3>开奖结果列表 <span id="drawInfo"></span></h3>
                    <div class="table-wrapper">
                        <table class="draw-table">
                            <thead>
                                <tr>
                                    <th style="width:80px;">期号</th>
                                    <th style="width:100px;">开奖时间</th>
                                    <th style="width:200px;">开奖号码 (10位数字)</th>
                                    <th style="width:80px;">状态</th>
                                    <th style="width:120px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="drawsBody">
                                <tr><td colspan="5" class="loading"><div class="spinner"></div>加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="users" class="tab-content">
                <div class="card">
                    <h3>用户管理</h3>
                    <div class="toolbar">
                        <input type="text" id="userSearch" placeholder="搜索用户名">
                        <select id="userRoleFilter">
                            <option value="">所有角色</option>
                            <option value="admin">管理员</option>
                            <option value="user">普通用户</option>
                        </select>
                        <select id="userStatusFilter">
                            <option value="">所有状态</option>
                            <option value="true">已启用</option>
                            <option value="false">已禁用</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadUsers()">搜索</button>
                        <button class="btn btn-success" onclick="showCreateUserModal()">+ 新建用户</button>
                    </div>
                </div>

                <div class="card">
                    <h3>用户列表</h3>
                    <div class="table-wrapper">
                        <table class="user-table">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>密码</th>
                                    <th>角色</th>
                                    <th>余额</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                    <th style="width:200px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="usersBody">
                                <tr><td colspan="7" class="loading"><div class="spinner"></div>加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 交易记录 -->
            <div id="transactions" class="tab-content">
                <div class="card">
                    <h3>交易记录</h3>
                    <div class="toolbar">
                        <select id="transTypeFilter">
                            <option value="">所有类型</option>
                            <option value="deposit">充值</option>
                            <option value="withdraw">提现</option>
                            <option value="adjust">调账</option>
                        </select>
                        <select id="transStatusFilter">
                            <option value="">所有状态</option>
                            <option value="pending">待处理</option>
                            <option value="approved">已批准</option>
                            <option value="rejected">已拒绝</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadTransactions()">搜索</button>
                    </div>
                </div>

                <div class="card">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>类型</th>
                                    <th>金额</th>
                                    <th>状态</th>
                                    <th>备注</th>
                                    <th>时间</th>
                                    <th class="admin-only">操作</th>
                                </tr>
                            </thead>
                            <tbody id="transactionsBody">
                                <tr><td colspan="7" class="loading"><div class="spinner"></div>加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑开奖结果模态框 -->
    <div id="editDrawModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑开奖结果</h3>
                <button class="modal-close" onclick="closeModal('editDrawModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>期号</label>
                <input type="text" id="editDrawPeriod" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>开奖号码 (10位数字)</label>
                <input type="text" id="editDrawResult" class="form-control" maxlength="10" placeholder="例如: 0123456789">
            </div>
            <button class="btn btn-primary" onclick="submitEditDraw()" style="width: 100%">保存修改</button>
        </div>
    </div>

    <!-- 新建/编辑用户模态框 -->
    <div id="userModal" class="modal">
        <div class="modal-content wide">
            <div class="modal-header">
                <h3 id="userModalTitle">新建用户</h3>
                <button class="modal-close" onclick="closeModal('userModal')">&times;</button>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="editUsername" class="form-control" placeholder="3-50个字符">
                </div>
                <div class="form-group">
                    <label>密码 <span id="passwordHint" style="color:#888;font-size:12px;">(至少6位)</span></label>
                    <input type="text" id="editPassword" class="form-control" placeholder="留空则不修改">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>角色</label>
                    <select id="editRole" class="form-control">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>余额</label>
                    <input type="number" id="editBalance" class="form-control" step="0.01" min="0">
                </div>
            </div>
            <div class="form-group">
                <label>状态</label>
                <select id="editStatus" class="form-control">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <input type="hidden" id="editUserId">
            <button class="btn btn-primary" onclick="submitUser()" style="width: 100%">保存</button>
        </div>
    </div>

    <!-- 充值模态框 -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>充值申请</h3>
                <button class="modal-close" onclick="closeModal('depositModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>充值金额</label>
                <input type="number" id="depositAmount" class="form-control" placeholder="请输入充值金额" min="1">
            </div>
            <div class="form-group">
                <label>备注（可选）</label>
                <input type="text" id="depositNote" class="form-control" placeholder="备注信息">
            </div>
            <button class="btn btn-primary" onclick="submitDeposit()" style="width: 100%">提交申请</button>
        </div>
    </div>

    <!-- 提现模态框 -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>提现申请</h3>
                <button class="modal-close" onclick="closeModal('withdrawModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>可提现余额</label>
                <input type="text" id="withdrawBalance" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>提现金额</label>
                <input type="number" id="withdrawAmount" class="form-control" placeholder="请输入提现金额" min="1">
            </div>
            <div class="form-group">
                <label>备注（可选）</label>
                <input type="text" id="withdrawNote" class="form-control" placeholder="备注信息">
            </div>
            <button class="btn btn-primary" onclick="submitWithdraw()" style="width: 100%">提交申请</button>
        </div>
    </div>

    <!-- 调账模态框 -->
    <div id="adjustModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>调整余额</h3>
                <button class="modal-close" onclick="closeModal('adjustModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>用户</label>
                <input type="text" id="adjustUsername" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>当前余额</label>
                <input type="text" id="adjustCurrentBalance" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>调整金额 (正数增加，负数减少)</label>
                <input type="number" id="adjustAmount" class="form-control" step="0.01">
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="adjustNote" class="form-control" placeholder="请填写调整原因">
            </div>
            <button class="btn btn-primary" onclick="submitAdjust()" style="width: 100%">确认调账</button>
        </div>
    </div>

    <!-- 修改密码模态框 -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改密码</h3>
                <button class="modal-close" onclick="closeModal('changePasswordModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" id="oldPassword" class="form-control" placeholder="请输入当前密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" class="form-control" placeholder="至少6个字符">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmNewPassword" class="form-control" placeholder="再次输入新密码">
            </div>
            <button class="btn btn-primary" onclick="submitChangePassword()" style="width: 100%">确认修改</button>
        </div>
    </div>

    <script>
        // 全局变量
        let currentUser = null;
        let token = null;
        let drawsData = [];
        let currentDrawId = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            token = localStorage.getItem('token');
            
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // 设置默认日期为今天
            document.getElementById('drawDate').value = new Date().toISOString().split('T')[0];

            // 标签切换
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });

            loadDashboard();
            updateServerTime();
            setInterval(updateServerTime, 1000);
        });

        // 更新服务器时间显示
        function updateServerTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: false 
            });
            document.getElementById('serverTime').textContent = '服务器时间: ' + timeStr;
        }

        // 加载控制台数据
        async function loadDashboard() {
            try {
                const res = await fetch('/api/auth?action=me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('balanceDisplay').textContent = `¥${data.user.balance.toFixed(2)}`;
                    document.getElementById('statusDisplay').textContent = data.user.isActive ? '正常' : '已禁用';
                    document.getElementById('userInfo').textContent = `${data.user.username} (${data.user.role === 'admin' ? '管理员' : '用户'})`;
                    currentUser = data.user;

                    // 显示/隐藏管理员功能
                    if (currentUser.role === 'admin') {
                        document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
                        loadAdminStats();
                    } else {
                        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                    }
                } else {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('加载数据错误:', error);
            }
        }

        // 加载管理员统计
        async function loadAdminStats() {
            try {
                const [usersRes, transRes] = await Promise.all([
                    fetch('/api/users', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/transactions?status=pending', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const usersData = await usersRes.json();
                const transData = await transRes.json();

                document.getElementById('userCountDisplay').textContent = usersData.pagination?.total || 0;
                document.getElementById('pendingTransactionsDisplay').textContent = transData.pagination?.total || 0;
            } catch (error) {
                console.error('加载统计错误:', error);
            }
        }

        // ==================== 开奖预设管理 ====================
        
        async function loadDraws() {
            const date = document.getElementById('drawDate').value;
            const interval = document.getElementById('drawInterval').value;

            if (!date) {
                showMessage('请选择日期', 'error');
                return;
            }

            const tbody = document.getElementById('drawsBody');
            tbody.innerHTML = '<tr><td colspan="5" class="loading"><div class="spinner"></div>加载中...</td></tr>';

            try {
                const res = await fetch(`/api/system?type=draws&action=daily&date=${date}&interval=${interval}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('drawInfo').textContent = `(${data.totalPeriods}期)`;
                    drawsData = data.draws;
                    renderDrawsTable(data.draws, parseInt(interval));
                } else {
                    tbody.innerHTML = '<tr><td colspan="5">加载失败</td></tr>';
                }
            } catch (error) {
                console.error('加载开奖预设错误:', error);
                tbody.innerHTML = '<tr><td colspan="5">网络错误</td></tr>';
            }
        }

        function renderDrawsTable(draws, interval) {
            const tbody = document.getElementById('drawsBody');
            tbody.innerHTML = '';

            if (draws.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
                return;
            }

            draws.forEach((draw, idx) => {
                // 计算开奖时间
                const baseTime = new Date();
                baseTime.setHours(0, 0, 0, 0);
                const minutes = draw.period * interval;
                const drawTime = new Date(baseTime.getTime() + minutes * 60000);
                const timeStr = drawTime.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="period-cell">${draw.period}</td>
                    <td class="time-cell">${timeStr}</td>
                    <td>
                        <input type="text" 
                               class="form-control result-input" 
                               value="${draw.result || ''}" 
                               maxlength="10" 
                               data-id="${draw._id}"
                               placeholder="未设置"
                               ${currentUser.role !== 'admin' ? 'readonly' : ''}>
                    </td>
                    <td class="${draw.status === 'completed' ? 'status-completed' : 'status-pending'}">
                        ${draw.status === 'completed' ? '已开奖' : '待开奖'}
                    </td>
                    <td>
                        ${currentUser.role === 'admin' ? `
                            <button class="btn btn-primary edit-btn" onclick="editDraw('${draw._id}', ${draw.period}, '${draw.result || ''}')">
                                编辑
                            </button>
                        ` : '-'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 编辑单个开奖结果
        function editDraw(id, period, result) {
            currentDrawId = id;
            document.getElementById('editDrawPeriod').value = `第 ${period} 期`;
            document.getElementById('editDrawResult').value = result;
            document.getElementById('editDrawModal').classList.add('active');
        }

        async function submitEditDraw() {
            const result = document.getElementById('editDrawResult').value.trim();
            
            if (!result || result.length !== 10 || !/^\d{10}$/.test(result)) {
                showMessage('请输入10位数字', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/system?type=draws&id=${currentDrawId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ result })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('修改成功', 'success');
                    closeModal('editDrawModal');
                    loadDraws();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('修改开奖结果错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // 保存所有开奖结果
        async function saveAllDraws() {
            const inputs = document.querySelectorAll('.result-input');
            const periods = [];
            
            inputs.forEach(input => {
                if (input.value && /^\d{10}$/.test(input.value)) {
                    periods.push({
                        id: input.dataset.id,
                        result: input.value
                    });
                }
            });

            if (periods.length === 0) {
                showMessage('没有有效的开奖结果需要保存', 'warning');
                return;
            }

            try {
                // 逐个保存
                let successCount = 0;
                for (const item of periods) {
                    const res = await fetch(`/api/system?type=draws&id=${item.id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ result: item.result })
                    });
                    if (res.ok) successCount++;
                }

                showMessage(`保存成功 ${successCount} 条`, 'success');
                loadDraws();
            } catch (error) {
                console.error('保存开奖预设错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // ==================== 用户管理 ====================

        async function loadUsers() {
            const search = document.getElementById('userSearch').value;
            const role = document.getElementById('userRoleFilter').value;
            const status = document.getElementById('userStatusFilter').value;

            const params = new URLSearchParams();
            if (search) params.append('search', search);
            if (role) params.append('role', role);
            if (status) params.append('isActive', status);

            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '<tr><td colspan="7" class="loading"><div class="spinner"></div>加载中...</td></tr>';

            try {
                const res = await fetch(`/api/users?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (res.ok) {
                    renderUsersTable(data.users);
                } else {
                    tbody.innerHTML = '<tr><td colspan="7">加载失败</td></tr>';
                }
            } catch (error) {
                console.error('加载用户列表错误:', error);
                tbody.innerHTML = '<tr><td colspan="7">网络错误</td></tr>';
            }
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">暂无数据</td></tr>';
                return;
            }

            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${user.username}</strong></td>
                    <td class="password-cell">********</td>
                    <td>${user.role === 'admin' ? '<span class="badge badge-info">管理员</span>' : '<span class="badge">用户</span>'}</td>
                    <td style="font-weight:bold;color:#28a745;">¥${user.balance.toFixed(2)}</td>
                    <td>${user.isActive ? '<span class="badge badge-success">启用</span>' : '<span class="badge badge-danger">禁用</span>'}</td>
                    <td>${new Date(user.createdAt).toLocaleString('zh-CN')}</td>
                    <td class="action-btns">
                        <button class="btn btn-primary" onclick="editUser('${user._id}', '${user.username}', '${user.role}', ${user.balance}, ${user.isActive})">编辑</button>
                        <button class="btn btn-secondary" onclick="showAdjustModal('${user._id}', '${user.username}', ${user.balance})">调账</button>
                        <button class="btn btn-warning" onclick="resetPassword('${user._id}', '${user.username}')">重置密码</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 新建用户
        function showCreateUserModal() {
            document.getElementById('userModalTitle').textContent = '新建用户';
            document.getElementById('editUserId').value = '';
            document.getElementById('editUsername').value = '';
            document.getElementById('editUsername').removeAttribute('readonly');
            document.getElementById('editPassword').value = '';
            document.getElementById('editPassword').setAttribute('placeholder', '至少6位密码');
            document.getElementById('passwordHint').textContent = '(至少6位)';
            document.getElementById('editRole').value = 'user';
            document.getElementById('editBalance').value = '0';
            document.getElementById('editStatus').value = 'true';
            document.getElementById('userModal').classList.add('active');
        }

        // 编辑用户
        function editUser(id, username, role, balance, isActive) {
            document.getElementById('userModalTitle').textContent = '编辑用户';
            document.getElementById('editUserId').value = id;
            document.getElementById('editUsername').value = username;
            document.getElementById('editUsername').setAttribute('readonly', true);
            document.getElementById('editPassword').value = '';
            document.getElementById('editPassword').setAttribute('placeholder', '留空则不修改');
            document.getElementById('passwordHint').textContent = '(留空不修改)';
            document.getElementById('editRole').value = role;
            document.getElementById('editBalance').value = balance;
            document.getElementById('editStatus').value = isActive ? 'true' : 'false';
            document.getElementById('userModal').classList.add('active');
        }

        // 提交用户
        async function submitUser() {
            const userId = document.getElementById('editUserId').value;
            const username = document.getElementById('editUsername').value.trim();
            const password = document.getElementById('editPassword').value;
            const role = document.getElementById('editRole').value;
            const balance = parseFloat(document.getElementById('editBalance').value) || 0;
            const isActive = document.getElementById('editStatus').value === 'true';

            // 验证
            if (!username) {
                showMessage('请输入用户名', 'error');
                return;
            }

            if (!userId && !password) {
                showMessage('新建用户必须设置密码', 'error');
                return;
            }

            if (password && password.length < 6) {
                showMessage('密码至少6位', 'error');
                return;
            }

            try {
                let res;
                if (userId) {
                    // 编辑用户
                    const body = { role, balance, isActive };
                    if (password) body.password = password;
                    
                    res = await fetch(`/api/users?id=${userId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(body)
                    });
                } else {
                    // 新建用户
                    res = await fetch('/api/users?action=create', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ username, password, role, balance })
                    });
                }

                const data = await res.json();

                if (res.ok) {
                    showMessage(userId ? '修改成功' : '创建成功', 'success');
                    closeModal('userModal');
                    loadUsers();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('保存用户错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // 重置密码
        async function resetPassword(userId, username) {
            if (!confirm(`确定要重置用户 "${username}" 的密码吗？`)) return;

            const newPwd = prompt('请输入新密码 (至少6位):');
            if (!newPwd || newPwd.length < 6) {
                showMessage('密码至少6位', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/users?id=${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ password: newPwd })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('密码已重置', 'success');
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('重置密码错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // 显示调账模态框
        function showAdjustModal(userId, username, balance) {
            document.getElementById('adjustUsername').value = username;
            document.getElementById('adjustCurrentBalance').value = `¥${balance.toFixed(2)}`;
            document.getElementById('adjustAmount').value = '';
            document.getElementById('adjustNote').value = '';
            document.getElementById('adjustModal').dataset.userId = userId;
            document.getElementById('adjustModal').classList.add('active');
        }

        async function submitAdjust() {
            const userId = document.getElementById('adjustModal').dataset.userId;
            const amount = parseFloat(document.getElementById('adjustAmount').value);
            const note = document.getElementById('adjustNote').value;

            if (!amount || amount === 0) {
                showMessage('请输入有效的金额', 'error');
                return;
            }

            try {
                const res = await fetch('/api/users?action=balance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId, amount, note })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage(data.message, 'success');
                    closeModal('adjustModal');
                    loadUsers();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('调账错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // ==================== 交易记录 ====================

        async function loadTransactions() {
            const type = document.getElementById('transTypeFilter').value;
            const status = document.getElementById('transStatusFilter').value;

            const params = new URLSearchParams();
            if (type) params.append('type', type);
            if (status) params.append('status', status);

            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = '<tr><td colspan="7" class="loading"><div class="spinner"></div>加载中...</td></tr>';

            try {
                const res = await fetch(`/api/transactions?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (res.ok) {
                    renderTransactionsTable(data.transactions);
                } else {
                    tbody.innerHTML = '<tr><td colspan="7">加载失败</td></tr>';
                }
            } catch (error) {
                console.error('加载交易记录错误:', error);
                tbody.innerHTML = '<tr><td colspan="7">网络错误</td></tr>';
            }
        }

        function renderTransactionsTable(transactions) {
            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = '';

            if (transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">暂无数据</td></tr>';
                return;
            }

            transactions.forEach(trans => {
                const typeMap = {
                    'deposit': '<span class="badge badge-success">充值</span>',
                    'withdraw': '<span class="badge badge-warning">提现</span>',
                    'adjust': '<span class="badge badge-info">调账</span>'
                };
                const statusMap = {
                    'pending': '<span class="badge badge-warning">待处理</span>',
                    'approved': '<span class="badge badge-success">已批准</span>',
                    'rejected': '<span class="badge badge-danger">已拒绝</span>'
                };

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${trans.userId?.username || '-'}</td>
                    <td>${typeMap[trans.type] || trans.type}</td>
                    <td style="font-weight:bold;color:${trans.type === 'deposit' || trans.type === 'adjust' && trans.amount > 0 ? '#28a745' : '#dc3545'}">
                        ${trans.type === 'withdraw' ? '-' : '+'}¥${Math.abs(trans.amount).toFixed(2)}
                    </td>
                    <td>${statusMap[trans.status] || trans.status}</td>
                    <td>${trans.note || '-'}</td>
                    <td>${new Date(trans.createdAt).toLocaleString('zh-CN')}</td>
                    <td class="admin-only">
                        ${trans.status === 'pending' ? `
                            <button class="btn btn-success" onclick="processTransaction('${trans._id}', 'approved')" style="padding: 5px 10px; font-size: 12px;">批准</button>
                            <button class="btn btn-danger" onclick="processTransaction('${trans._id}', 'rejected')" style="padding: 5px 10px; font-size: 12px;">拒绝</button>
                        ` : '-'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function processTransaction(transactionId, status) {
            try {
                const res = await fetch('/api/transactions', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ transactionId, status })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage(data.message, 'success');
                    loadTransactions();
                    loadDashboard();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('处理交易错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // ==================== 充值/提现 ====================

        function showDepositModal() {
            document.getElementById('depositAmount').value = '';
            document.getElementById('depositNote').value = '';
            document.getElementById('depositModal').classList.add('active');
        }

        async function submitDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const note = document.getElementById('depositNote').value;

            if (!amount || amount <= 0) {
                showMessage('请输入有效的充值金额', 'error');
                return;
            }

            try {
                const res = await fetch('/api/transactions?action=request', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ type: 'deposit', amount, note })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('充值申请已提交', 'success');
                    closeModal('depositModal');
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('提交充值申请错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        function showWithdrawModal() {
            document.getElementById('withdrawBalance').value = `¥${currentUser.balance.toFixed(2)}`;
            document.getElementById('withdrawAmount').value = '';
            document.getElementById('withdrawNote').value = '';
            document.getElementById('withdrawModal').classList.add('active');
        }

        async function submitWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const note = document.getElementById('withdrawNote').value;

            if (!amount || amount <= 0) {
                showMessage('请输入有效的提现金额', 'error');
                return;
            }

            if (amount > currentUser.balance) {
                showMessage('余额不足', 'error');
                return;
            }

            try {
                const res = await fetch('/api/transactions?action=request', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ type: 'withdraw', amount, note })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('提现申请已提交', 'success');
                    closeModal('withdrawModal');
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('提交提现申请错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // ==================== 修改密码 ====================

        function showChangePasswordModal() {
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmNewPassword').value = '';
            document.getElementById('changePasswordModal').classList.add('active');
        }

        async function submitChangePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;

            if (!oldPassword || !newPassword || !confirmNewPassword) {
                showMessage('请填写所有字段', 'error');
                return;
            }

            if (newPassword !== confirmNewPassword) {
                showMessage('两次输入的新密码不一致', 'error');
                return;
            }

            try {
                const res = await fetch('/api/auth?action=change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ oldPassword, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('密码修改成功，请重新登录', 'success');
                    closeModal('changePasswordModal');
                    setTimeout(() => {
                        logout();
                    }, 2000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                console.error('修改密码错误:', error);
                showMessage('网络错误', 'error');
            }
        }

        // ==================== 工具函数 ====================

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function showMessage(text, type) {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();

            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.textContent = text;
            msg.style.cssText = 'position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:5px;z-index:9999;font-weight:500;';
            if (type === 'success') msg.style.background = '#28a745';
            else if (type === 'error') msg.style.background = '#dc3545';
            else msg.style.background = '#ffc107';
            msg.style.color = 'white';
            document.body.appendChild(msg);

            setTimeout(() => msg.remove(), 3000);
        }
    </script>
</body>
</html>
